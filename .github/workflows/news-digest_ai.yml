name: News digest (AI関連)

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "トピック"
        required: false
        default: "ClaudeCode,Gemini,OpenAI,Codex,Cursor,GithubCopilot"

jobs:
  run-digest:
    uses: ./.github/workflows/reusable-news-digest.yml
    with:
      name: "AI関連"
      topic: ${{ github.event.inputs.topic || 'ClaudeCode,Gemini,OpenAI,Codex,Cursor,GithubCopilot' }}
    secrets: inherit
