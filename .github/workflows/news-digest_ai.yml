name: News digest (AI関連)

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "トピック"
        required: false
        default: "Claude Code Gemini OpenAI Codex Cursor"

jobs:
  run-digest:
    uses: ./.github/workflows/reusable-news-digest.yml
    with:
      name: "AI関連"
      topic: ${{ github.event.inputs.topic || 'Claude Code Gemini OpenAI Codex Cursor' }}
    secrets: inherit
