name: News digest (イラン情勢)

on:
  schedule:
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "トピック"
        required: false
        default: "イラン情勢"

jobs:
  run-digest:
    uses: ./.github/workflows/reusable-news-digest.yml
    with:
      name: "イラン情勢"
      topic: ${{ github.event.inputs.topic || 'イラン情勢' }}
    secrets: inherit
